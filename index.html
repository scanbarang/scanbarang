<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gudang Scan Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.header{
  background:#111827;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.panel{
  display:flex;
  gap:5px;
  padding:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.masuk{background:#22c55e;color:white;}
.keluar{background:#ef4444;color:white;}

#reader{
  width:100%;
  height:60vh;
}

.result{
  text-align:center;
  padding:10px;
}

</style>

</head>

<body>

<div class="header">📦 GUDANG SCAN PRO</div>

<div class="panel">
  <button class="masuk" onclick="setAksi('MASUK')">MASUK</button>
  <button class="keluar" onclick="setAksi('KELUAR')">KELUAR</button>
</div>

<div id="reader"></div>

<div class="result" id="hasil">Siap Scan</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbwYffqJQxmZ9Y8PyYIPPbttmNaGdKiOrpm0raE87T-eJo2SFkH_VJVUB2Kql1G2X_3oBQ/exec";

let aksi = null;
let lock = false;
let lastCode = "";
let lastTime = 0;

/* MODE */
function setAksi(a){
  aksi = a;
}

/* SCAN (ANTI JEPRET 100%) */
function onScanSuccess(decodedText){

  const now = Date.now();

  // 🔥 1. GLOBAL LOCK
  if(lock) return;

  // 🔥 2. DUPLIKAT DETECT
  if(decodedText === lastCode && (now - lastTime) < 4000){
    return;
  }

  lastCode = decodedText;
  lastTime = now;

  if(!aksi){
    alert("Pilih MASUK / KELUAR dulu");
    return;
  }

  // 🔥 LOCK LANGSUNG (INI KUNCI UTAMA)
  lock = true;

  document.getElementById("hasil").innerText = decodedText;

  // 🔥 STOP SCAN SEMENTARA (BIAR TIDAK JEPRET)
  scanner.pause();

  setTimeout(() => {

    const ok = confirm(
      "BARCODE: " + decodedText +
      "\nAKSI: " + aksi +
      "\n\nLANJUT?"
    );

    if(!ok){
      scanner.resume();
      lock = false;
      return;
    }

    fetch(GAS_URL,{
      method:"POST",
      body:JSON.stringify({
        barcode: decodedText,
        aksi: aksi,
        qty: 1,
        tipe: "barang"
      })
    })
    .then(res => res.text())
    .then(res => {

      alert(res);

      scanner.resume();

      setTimeout(()=>{
        lock = false;
      }, 1500);

    })
    .catch(()=>{
      scanner.resume();
      lock = false;
    });

  }, 200);

}

/* START */
let scanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
