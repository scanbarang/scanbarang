<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gudang Scan Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.header{
  background:#111827;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.panel{
  display:flex;
  gap:5px;
  padding:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.masuk{background:#22c55e;color:white;}
.keluar{background:#ef4444;color:white;}
.reset{background:#f59e0b;color:white;}

#reader{
  width:100%;
  height:60vh;
}

.result{
  text-align:center;
  padding:10px;
}

</style>

</head>

<body>

<div class="header">📦 GUDANG SCAN</div>

<div class="panel">
  <button class="masuk" onclick="setAksi('MASUK')">MASUK</button>
  <button class="keluar" onclick="setAksi('KELUAR')">KELUAR</button>
  <button class="reset" onclick="resetScanner()">RESET</button>
</div>

<div id="reader"></div>

<div class="result" id="hasil">Siap Scan</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbwYffqJQxmZ9Y8PyYIPPbttmNaGdKiOrpm0raE87T-eJo2SFkH_VJVUB2Kql1G2X_3oBQ/exec";

let html5QrCode;
let aksi = null;
let isLocked = false;
let lastCode = "";
let lastTime = 0;

/* MODE */
function setAksi(a){
  aksi = a;
}

/* START SCANNER (STABLE MODE) */
function startScanner(){

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {

    if(!cameras || cameras.length === 0){
      alert("Camera tidak ditemukan");
      return;
    }

    html5QrCode.start(
      cameras[0].id,
      {
        fps: 10,
        qrbox: 250
      },
      onScanSuccess
    );

  });

}

/* RESET ANTI FREEZE (STOP + START ULANG) */
function resetScanner(){

  document.getElementById("hasil").innerText = "Reset Scanner...";

  try{
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      startScanner();
      document.getElementById("hasil").innerText = "Siap Scan";
    });
  }catch(e){
    startScanner();
  }

}

/* SCAN */
function onScanSuccess(decodedText){

  const now = Date.now();

  if(isLocked) return;

  if(decodedText === lastCode && (now - lastTime) < 3000){
    return;
  }

  lastCode = decodedText;
  lastTime = now;

  if(!aksi){
    alert("Pilih MASUK / KELUAR dulu");
    return;
  }

  isLocked = true;

  document.getElementById("hasil").innerText = decodedText;

  const ok = confirm("Barcode: " + decodedText + "\nAksi: " + aksi);

  if(!ok){
    isLocked = false;
    return;
  }

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({
      barcode: decodedText,
      aksi: aksi,
      qty: 1,
      tipe: "barang"
    })
  })
  .then(res => res.text())
  .then(res => {

    alert(res);

    setTimeout(()=>{
      isLocked = false;
    },2000);

  })
  .catch(()=>{
    isLocked = false;
  });

}

/* INIT */
window.onload = startScanner;

</script>

</body>
</html>
