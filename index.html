<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwYffqJQxmZ9Y8PyYIPPbttmNaGdKiOrpm0raE87T-eJo2SFkH_VJVUB2Kql1G2X_3oBQ/exec";

function onScanSuccess(decodedText){

  document.getElementById("hasil")
    .innerHTML = decodedText;

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({
      barcode:decodedText
    })
  })
  .then(r => r.text())
  .then(res => {
    console.log(res);
  })
  .catch(err => {
    console.log(err);
  });

}

const scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
}
);

scanner.render(onScanSuccess);

</script>
