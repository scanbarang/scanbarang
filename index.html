<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Gudang Scan Pro</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial;
    }

    body{
      background:#0b1220;
      color:white;
      height:100vh;
      overflow:hidden;
    }

    /* HEADER */
    .header{
      background:#111827;
      padding:12px;
      text-align:center;
      font-weight:bold;
      font-size:18px;
    }

    /* MODE */
    .mode{
      text-align:center;
      margin:10px;
      font-size:16px;
    }

    .mode span{
      color:#22c55e;
      font-weight:bold;
    }

    /* BUTTON PANEL */
    .panel{
      display:flex;
      justify-content:space-around;
      margin:10px;
    }

    button{
      flex:1;
      margin:5px;
      padding:15px;
      border:none;
      border-radius:10px;
      font-size:16px;
      font-weight:bold;
    }

    .in{ background:#22c55e; color:white; }
    .out{ background:#ef4444; color:white; }
    .stop{ background:#f59e0b; color:white; }

    /* SCANNER FULL AREA */
    #reader{
      width:100%;
      height:55vh;
      margin-top:10px;
    }

    /* RESULT */
    .result{
      text-align:center;
      padding:15px;
      font-size:18px;
      color:#38bdf8;
      font-weight:bold;
    }

    /* FOOTER BAR (like app) */
    .footer{
      position:absolute;
      bottom:0;
      width:100%;
      background:#111827;
      padding:10px;
      text-align:center;
      font-size:12px;
      color:#9ca3af;
    }
  </style>
</head>

<body>

<div class="header">📦 GUDANG SCAN PRO</div>

<div class="mode">MODE: <span id="mode">MASUK</span></div>

<div class="panel">
  <button class="in" onclick="setMode('MASUK')">MASUK</button>
  <button class="out" onclick="setMode('KELUAR')">KELUAR</button>
  <button class="stop" onclick="location.reload()">RESET</button>
</div>

<div id="reader"></div>

<div class="result" id="hasil">Siap Scan Barang</div>

<div class="footer">Scan System v1 • Android Mode</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbwYffqJQxmZ9Y8PyYIPPbttmNaGdKiOrpm0raE87T-eJo2SFkH_VJVUB2Kql1G2X_3oBQ/exec";

let mode = "MASUK";
let lastScan = "";
let lastTime = 0;

function setMode(m){
  mode = m;
  document.getElementById("mode").innerText = m;
}

function onScanSuccess(decodedText){

  const now = Date.now();

  // anti double scan
  if(decodedText === lastScan && (now - lastTime) < 3000){
    return;
  }

  lastScan = decodedText;
  lastTime = now;

  document.getElementById("hasil").innerText = decodedText;

  const ok = confirm(
    "MODE: " + mode +
    "\nBARCODE: " + decodedText +
    "\n\nSimpan data?"
  );

  if(!ok) return;

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({
      barcode: decodedText,
      type: mode
    })
  })
  .then(() => {
    document.getElementById("hasil").innerText = "✔️ TERSIMPAN";
  });

}

let scanner = new Html5QrcodeScanner(
  "reader",
  {
    fps: 10,
    qrbox: 250,
    rememberLastUsedCamera: true
  }
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
