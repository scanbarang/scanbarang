<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Gudang Scan Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
}

body{
  background:#0b1220;
  color:white;
  height:100vh;
  overflow:hidden;
}

.header{
  background:#111827;
  padding:12px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.mode{
  text-align:center;
  margin:10px;
  font-size:16px;
}

.mode span{
  color:#22c55e;
  font-weight:bold;
}

.panel{
  display:flex;
  justify-content:space-around;
  margin:10px;
}

button{
  flex:1;
  margin:5px;
  padding:15px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
}

.in{ background:#22c55e; color:white; }
.out{ background:#ef4444; color:white; }
.reset{ background:#f59e0b; color:white; }

#reader{
  width:100%;
  height:55vh;
}

.result{
  text-align:center;
  padding:15px;
  font-size:18px;
  color:#38bdf8;
  font-weight:bold;
}

.footer{
  position:absolute;
  bottom:0;
  width:100%;
  background:#111827;
  padding:10px;
  text-align:center;
  font-size:12px;
  color:#9ca3af;
}

</style>

</head>

<body>

<div class="header">📦 GUDANG SCAN PRO</div>
