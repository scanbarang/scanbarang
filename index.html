<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gudang Scan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.header{
  background:#111827;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.modeBox{
  text-align:center;
  padding:10px;
  font-weight:bold;
}

.panel{
  display:flex;
  gap:5px;
  padding:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.masuk{background:#22c55e;color:white;}
.keluar{background:#ef4444;color:white;}

#reader{
  width:100%;
  height:60vh;
}

.result{
  text-align:center;
  padding:10px;
}

</style>

</head>

<body>

<div class="header">📦 GUDANG SCAN</div>

<div class="modeBox">
MODE: <span id="modeText" style="color:#f59e0b;">BELUM PILIH</span>
</div>

<div class="panel">
  <button class="masuk" onclick="setAksi('MASUK')">MASUK</button>
  <button class="keluar" onclick="setAksi('KELUAR')">KELUAR</button>
</div>

<div id="reader"></div>

<div class="result" id="hasil">Siap Scan</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbwYffqJQxmZ9Y8PyYIPPbttmNaGdKiOrpm0raE87T-eJo2SFkH_VJVUB2Kql1G2X_3oBQ/exec";

let aksi = null;
let lastCode = "";
let lastTime = 0;
let lock = false;

/* MODE */
function setAksi(a){
  aksi = a;

  let color = "#f59e0b";
  if(a === "MASUK") color = "#22c55e";
  if(a === "KELUAR") color = "#ef4444";

  document.getElementById("modeText").innerText = a;
  document.getElementById("modeText").style.color = color;
}

/* SCAN SIMPLE (INI YANG TADI ENAK) */
function onScanSuccess(decodedText){

  const now = Date.now();

  if(lock) return;

  if(decodedText === lastCode && (now - lastTime) < 3000){
    return;
  }

  lastCode = decodedText;
  lastTime = now;

  if(!aksi){
    alert("Pilih MASUK / KELUAR dulu");
    return;
  }

  lock = true;

  document.getElementById("hasil").innerText = decodedText;

  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({
      barcode: decodedText,
      aksi: aksi,
      qty: 1,
      tipe: "barang"
    })
  })
  .then(res => res.text())
  .then(res => {

    document.getElementById("hasil").innerText = res;

    setTimeout(()=>{
      lock = false;
    }, 1500);

  })
  .catch(()=>{
    lock = false;
  });

}

/* SCANNER ORIGINAL (JANGAN DIUTAK-ATIK LAGI) */
let scanner = new Html5QrcodeScanner(
  "reader",
  { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
